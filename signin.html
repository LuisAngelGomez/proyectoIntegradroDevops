<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DURANGO - Crear Cuenta</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="login-card">
        <header class="login-header">
            <img src="logo.png" alt="Logo DURANGO" class="logo-img">
        </header>

        <form action="/signin" method="POST" class="login-form">
            <div class="form-group">
                <label for="username">Nombre de Usuario</label>
                <input type="text" id="username" name="username" placeholder="Ej. JuanPerez" required>
            </div>

            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" name="password" placeholder="Cree una contraseña" required>
            </div>

            <button type="submit" class="btn-login">Registrar Cuenta</button>
        </form>

        <footer class="login-footer">
            <p class="signup-text">
                ¿Ya tienes cuenta? <a href="login.html" class="create-link">Inicia sesión</a>
            </p>
        </footer>
    </div>
</body>
</html>
