<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DURANGO - Crear Cuenta</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="login-card">
        <header class="login-header">
            <img src="logo.png" alt="Logo DURANGO" class="logo-img">
        </header>

      <form action="/signin" method="POST" class="login-form">
    <div class="form-group">
        <label>Nombre de Usuario</label>
        <input type="text" name="nombre" placeholder="Ej: Guzman_F" required>
    </div>

    <div class="form-group">
        <label>Correo Electrónico</label>
        <input type="email" name="email" placeholder="admin@durango.com" required>
    </div>

    <div class="form-group">
        <label>Contraseña</label>
        <input type="password" name="password" placeholder="••••••••" required>
    </div>

    <button type="submit" class="btn-signin">Crear Cuenta</button>
</form>
        <br>

        <footer class="login-footer">
            <p class="signup-text">
                ¿Ya tienes cuenta? <a href="index.html" class="create-link">Inicia sesión</a>
            </p>
        </footer>
    </div>
</body>
</html>
